        <div class="modal fade" id="addContactModal" tabindex="-1"
            aria-labelledby="addContactModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addContactModalLabel">Add
                            New Contact</h5>
                        <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <form id="contactForm">

                            <div
                                class="contact-photo-section d-flex justify-content-center align-items-center flex-column">
                                <div class="contact-photo-preview text-center">
                                    <i class="fas fa-user"></i>
                                </div>
                                <label for="photoInput"
                                    class="btn btn-secondary btn-sm">
                                    <i class="fas fa-camera"></i> Change Photo
                                </label>
                                <input type="file" id="photoInput"
                                    accept="image/*" style="display: none;">
                            </div>

                            <div class="form-group">
                                <label for="fullName">Full Name <span
                                        class="required">*</span></label>
                                <input type="text" class="form-control"
                                    id="fullName" placeholder="Enter full name"
                                    required>
                            </div>

                            <div class="form-group">
                                <label for="phoneNumber">Phone Number <span
                                        class="required">*</span></label>
                                <input type="tel" class="form-control"
                                    id="phoneNumber"
                                    placeholder="Enter phone number" required>
                            </div>

                            <div class="form-group">
                                <label for="emailAddress">Email Address</label>
                                <input type="email" class="form-control"
                                    id="emailAddress"
                                    placeholder="Enter email address">
                            </div>

                            <div class="form-group">
                                <label for="address">Address</label>
                                <input type="text" class="form-control"
                                    id="address" placeholder="Enter address">
                            </div>

                            <div class="form-group">
                                <label for="group">Group</label>
                                <select class="form-control" id="group">
                                    <option value>Select a group</option>
                                    <option value="family">Family</option>
                                    <option value="friends">Friends</option>
                                    <option value="work">Work</option>
                                    <option value="school">School</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="notes">Notes</label>
                                <textarea class="form-control" id="notes"
                                    rows="3" placeholder="Enter notes"></textarea>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                    id="isFavorite">
                                <label class="form-check-label" for="isFavorite">
                                    <i class="fas fa-star"></i> Favorite
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                    id="isEmergency">
                                <label class="form-check-label"
                                    for="isEmergency">
                                    <i class="fas fa-heartbeat"></i> Emergency
                                </label>
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary"
                                    data-bs-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-primary"
                                    id="saveContactBtn" onclick="addContact()">
                                    <i class="fas fa-check "></i> Save Contact
                                </button>
                                <button type="button"
                                    class="btn btn-warning d-none"
                                    id="updateContactBtn">
                                    <i class="fas fa-check"></i> update Contact
                                </button>
                            </div>

                        </form>
